<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Docker Mastery - Product Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #0f2027;
            text-align: center;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        .badges {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
        }
        .instance-info {
            background: #e3f2fd;
            border-left: 4px solid #2196f3;
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .form-container {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
        }
        .form-container h3 {
            margin-bottom: 15px;
            color: #495057;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            margin: 5px 0 15px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover {
            transform: translateY(-2px);
        }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .product-card {
            border: 1px solid #e9ecef;
            padding: 15px;
            border-radius: 10px;
            transition: all 0.3s;
        }
        .product-card:hover {
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transform: translateY(-2px);
        }
        .product-card h3 {
            margin-bottom: 10px;
            color: #495057;
        }
        .price {
            font-size: 24px;
            color: #28a745;
            font-weight: bold;
            margin: 10px 0;
        }
        .quantity {
            color: #6c757d;
            margin-bottom: 15px;
        }
        .delete {
            background: #dc3545;
            margin-left: 10px;
        }
        .edit {
            background: #ffc107;
            color: #333;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        .error {
            color: #dc3545;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐳 Docker Mastery Project</h1>
        <div class="badges">
            <span class="badge">Multi-stage Builds</span>
            <span class="badge">Load Balancing</span>
            <span class="badge">Rate Limiting</span>
            <span class="badge">Reverse Proxy</span>
        </div>
        <div class="subtitle">Go + MySQL + Nginx | Advanced Container Orchestration</div>
        
        <div class="instance-info">
            🖥️ Connected to: <strong id="instanceId">Loading...</strong>
        </div>
        
        <div class="form-container">
            <h3>➕ Add New Product</h3>
            <form id="productForm">
                <input type="text" id="name" placeholder="Product Name" required>
                <textarea id="description" placeholder="Description" rows="3"></textarea>
                <input type="number" id="price" placeholder="Price" step="0.01" required>
                <input type="number" id="quantity" placeholder="Quantity" value="0">
                <button type="submit">Add Product</button>
            </form>
        </div>
        
        <div class="products-container">
            <h3>📦 Products List</h3>
            <div id="productsList" class="products-grid">
                <div class="loading">Loading products...</div>
            </div>
        </div>
    </div>

    <script>
        // Use relative URL - works with Nginx on any port
        const API_URL = '/api';
        
        async function fetchProducts() {
            try {
                const response = await fetch(`${API_URL}/products`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const instanceId = response.headers.get('X-Instance-ID');
                if (instanceId) {
                    document.getElementById('instanceId').textContent = instanceId;
                }
                const products = await response.json();
                displayProducts(products);
            } catch (error) {
                console.error('Error fetching products:', error);
                document.getElementById('productsList').innerHTML = '<div class="error">❌ Cannot connect to backend. Make sure Docker is running.</div>';
            }
        }
        
        function displayProducts(products) {
            const container = document.getElementById('productsList');
            if (!products || products.length === 0) {
                container.innerHTML = '<div class="loading">No products found. Add your first product!</div>';
                return;
            }
        
            container.innerHTML = products.map(product => `
                <div class="product-card">
                    <h3>${escapeHtml(product.name)}</h3>
                    <p>${escapeHtml(product.description) || 'No description'}</p>
                    <div class="price">$${parseFloat(product.price).toFixed(2)}</div>
                    <div class="quantity">📦 Stock: ${product.quantity}</div>
                    <button class="edit" onclick="editProduct(${product.id})">✏️ Edit</button>
                    <button class="delete" onclick="deleteProduct(${product.id})">🗑️ Delete</button>
                </div>
            `).join('');
        }
        
        document.getElementById('productForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const product = {
                name: document.getElementById('name').value,
                description: document.getElementById('description').value,
                price: parseFloat(document.getElementById('price').value),
                quantity: parseInt(document.getElementById('quantity').value) || 0
            };
        
            if (!product.name) {
                alert('Product name is required');
                return;
            }
            if (isNaN(product.price) || product.price <= 0) {
                alert('Valid price is required');
                return;
            }
        
            try {
                const response = await fetch(`${API_URL}/products`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(product)
                });
        
                if (response.ok) {
                    document.getElementById('productForm').reset();
                    fetchProducts();
                } else {
                    const error = await response.text();
                    alert(`Error: ${error}`);
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Error creating product. Is the backend running?');
            }
        });
        
        async function deleteProduct(id) {
            if (confirm('Delete this product?')) {
                try {
                    const response = await fetch(`${API_URL}/products/${id}`, {
                        method: 'DELETE'
                    });
                    if (response.ok) fetchProducts();
                    else alert('Delete failed');
                } catch (error) {
                    alert('Error deleting product');
                }
            }
        }
        
        async function editProduct(id) {
            const newName = prompt('Enter new product name:');
            if (newName) {
                try {
                    const response = await fetch(`${API_URL}/products/${id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name: newName })
                    });
                    if (response.ok) fetchProducts();
                    else alert('Update failed');
                } catch (error) {
                    alert('Error updating product');
                }
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Load products on page load and every 5 seconds
        fetchProducts();
        setInterval(fetchProducts, 5000);
    </script>
</body>
</html>
