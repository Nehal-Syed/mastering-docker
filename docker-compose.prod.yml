version: '3.8'

services:
  nginx:
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    restart: always

  backend1:
    build: ./backend
    volumes:
      - ./backend:/app
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    restart: always

  backend2:
    build: ./backend
    volumes:
      - ./backend:/app
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    restart: always

  backend3:
    build: ./backend
    volumes:
      - ./backend:/app
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    restart: always

  mysql:
    deploy:
      resources:
        limits:
          memory: 1G